site_name: AgentNest
site_description: Secure, self-hosted runtime for isolated AI agent execution
site_url: https://mihirahuja1.github.io/agentnestOSS/
repo_url: https://github.com/mihirahuja1/agentnestOSS
repo_name: mihirahuja1/agentnestOSS
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/agentnest-logo.png
  favicon: assets/agentnest-logo.png
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Use dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Use light mode

nav:
  - Home: index.md
  - Get started:
      - Quickstart: quickstart.md
      - Installation: installation.md
  - Concepts:
      - Architecture: architecture.md
      - Security model: security.md
      - Runtime backends: backends.md
      - Brand: branding.md
  - Guides:
      - Add-on capabilities: guides/addons.md
      - Policies and secrets: guides/policies.md
      - Async and streaming: guides/async-streaming.md
      - Templates and snapshots: guides/state.md
      - Pools and artifacts: guides/pools-artifacts.md
      - Framework integrations: guides/integrations.md
      - Kubernetes and remote workers: guides/remote.md
      - MCP, browser, GPU, and Git: guides/agents.md
  - Reference:
      - Python API: api.md
      - CLI: cli.md
      - Benchmarks: benchmarks.md
      - Configuration profiles: configuration.md
  - Operations:
      - Deployment: deployment.md
      - Development: development.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

copyright: Copyright &copy; 2026 AgentNest contributors · Apache-2.0
